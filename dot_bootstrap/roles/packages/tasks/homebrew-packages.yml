---
- name: Install Homebrew packages
  become: true
  become_user: "{{ user }}"
  community.general.homebrew:
    name:
      - ctop
      - eza
      - fzf
      - gh
      - just
      - tfenv
      - uv
      - zoxide
      - zsh-autosuggestions
      - zsh-syntax-highlighting
      - kubectl
      - kubectx
      - k9s
      - helm
      - sesh
      - lazygit
      - ranger
      - ipython
      - mise
    state: present
  environment:
    PATH: "/home/linuxbrew/.linuxbrew/bin:{{ ansible_env.PATH }}"
