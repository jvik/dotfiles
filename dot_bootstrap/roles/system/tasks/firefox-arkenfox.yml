---
- name: Check if Firefox main profile exists
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.config/mozilla/firefox/main"
  register: firefox_profile

- name: Download arkenfox updater.sh
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/arkenfox/user.js/master/updater.sh
    dest: "{{ ansible_env.HOME }}/.config/mozilla/firefox/main/updater.sh"
    mode: "0755"
  when: firefox_profile.stat.exists

- name: Generate arkenfox user.js
  ansible.builtin.command:
    cmd: "{{ ansible_env.HOME }}/.config/mozilla/firefox/main/updater.sh -u -s"
    creates: "{{ ansible_env.HOME }}/.config/mozilla/firefox/main/user.js"
  when: firefox_profile.stat.exists
