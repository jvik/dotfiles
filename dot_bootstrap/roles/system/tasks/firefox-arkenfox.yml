---
- name: Ensure Firefox main profile directory exists
  ansible.builtin.file:
    path: "/home/{{ user }}/.config/mozilla/firefox/main"
    state: directory
    mode: "0700"

- name: Download arkenfox updater.sh
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/arkenfox/user.js/master/updater.sh
    dest: "/home/{{ user }}/.config/mozilla/firefox/main/updater.sh"
    mode: "0755"

- name: Generate arkenfox user.js
  ansible.builtin.command:
    cmd: "/home/{{ user }}/.config/mozilla/firefox/main/updater.sh -u -s"
    chdir: "/home/{{ user }}/.config/mozilla/firefox/main"
  changed_when: true

- name: Ensure Firefox enterprise policies directory exists
  become: true
  ansible.builtin.file:
    path: /etc/firefox/policies
    state: directory
    mode: "0755"

- name: Install Firefox enterprise policies
  become: true
  ansible.builtin.copy:
    src: firefox/policies.json
    dest: /etc/firefox/policies/policies.json
    owner: root
    group: root
    mode: "0644"

- name: Ensure applications directory exists
  ansible.builtin.file:
    path: "/home/{{ user }}/.config/applications"
    state: directory
    mode: "0755"

- name: Create Firefox desktop entry with custom profile
  ansible.builtin.copy:
    content: |
      [Desktop Entry]
      Name=Firefox
      Comment=Web Browser
      Exec=firefox --profile ~/.config/mozilla/firefox/main %u
      Icon=firefox
      Type=Application
      Categories=Network;WebBrowser;
      MimeType=text/html;text/xml;application/xhtml+xml;application/vnd.mozilla.xul+xml;text/mml;x-scheme-handler/http;x-scheme-handler/https;
      StartupNotify=true
      StartupWMClass=firefox
    dest: "/home/{{ user }}/.config/applications/Firefox.desktop"
    mode: "0644"
    owner: "{{ user }}"
    group: "{{ user }}"
