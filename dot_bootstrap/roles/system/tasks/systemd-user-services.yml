---
- name: Enable kanshi systemd user service
  ansible.builtin.systemd:
    name: kanshi.service
    enabled: true
    scope: user
  become: false
  become_user: "{{ ansible_user_id }}"

- name: Enable battery-check systemd user timer
  ansible.builtin.systemd:
    name: battery-check.timer
    enabled: true
    state: started
    scope: user
  become: false
  become_user: "{{ ansible_user_id }}"
