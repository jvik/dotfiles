---
- name: Check if jlink is installed
  ansible.builtin.command: which jlink
  register: jlink_check
  changed_when: false
  failed_when: false

- name: Install jLink from jvik fork
  ansible.builtin.shell: >
    curl -o- https://raw.githubusercontent.com/jvik/jLink/main/install.sh | bash -x
  register: jlink_install
  when: jlink_check.rc != 0

- name: Show jLink install output
  ansible.builtin.debug:
    msg: "{{ jlink_install.stdout_lines + jlink_install.stderr_lines }}"
  when: jlink_check.rc != 0
