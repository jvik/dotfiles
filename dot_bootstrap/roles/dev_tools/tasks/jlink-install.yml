---
- name: Check if jlink is installed
  ansible.builtin.command: which jlink
  register: jlink_check
  changed_when: false
  failed_when: false

- name: Install jLink
  when: jlink_check.rc != 0
  block:
    - name: Clone jLink repo
      ansible.builtin.git:
        repo: https://github.com/jvik/jLink.git
        dest: /tmp/jlink-src
        version: main
        force: true
      become: true

    - name: Patch jLink install script to skip interactive prompt
      ansible.builtin.replace:
        path: /tmp/jlink-src/install.sh
        regexp: "read -p.*response.*< /dev/tty"
        replace: "response=y"
      become: true

    - name: Run jLink install script
      ansible.builtin.shell: bash -x install.sh
      args:
        chdir: /tmp/jlink-src
      register: jlink_install
      become: true

    - name: Show jLink install output
      ansible.builtin.debug:
        msg: "{{ jlink_install.stdout_lines + jlink_install.stderr_lines }}"
