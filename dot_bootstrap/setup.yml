---
- name: System setup and package installation
  hosts: localhost
  become: true
  gather_facts: true
  vars_files:
    - ~/.bootstrap/vars.yml
  pre_tasks:
    - name: Verify sudo credentials
      ansible.builtin.command: whoami
      become: true
      changed_when: false

  roles:
    - repositories
    - packages
    - shell
    - dev_tools
    - system
